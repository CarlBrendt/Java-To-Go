services:

  validation-orchestrator:
    build:
      context: ./validation/validation-orchestrator
      dockerfile: Dockerfile
    container_name: validation-orchestrator
    ports:
      - "8095:8095"
    environment:
      - ORCHESTRATOR_REPO_ROOT=/repo
      - ORCHESTRATOR_ARTIFACT_BASE_URL=http://server:8585
      - ORCHESTRATOR_WORKSPACE_ROOT=/repo/.validation-runs
      - ORCHESTRATOR_VALIDATION_NETWORK=validation-stack_default
    volumes:
      - .:/repo
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - app-network
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    shm_size: '6gb'
    container_name: server
    ports:
      - "8585:8585"
    env_file:
      - '.env'
    environment:
      - GIT_TERMINAL_PROMPT=0
      - GOPATH=/root/go
      - VALIDATION_ORCHESTRATOR_BASE_URL=http://validation-orchestrator:8095
    volumes:
      - go-cache:/root/go
    depends_on:
      validation-orchestrator:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - app-network
    restart: unless-stopped
    command: ["./entrypoint.sh"]

  minio:
    image: minio/minio:latest
    container_name: minio_server
    command: server --console-address ":9001" /data/
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: mws
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio-storage:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 mws minio123) do echo 'Waiting for minio...' && sleep 2; done;
      /usr/bin/mc mb myminio/java-to-go || true;
      /usr/bin/mc anonymous set download myminio/java-to-go;
      echo 'MinIO initialized successfully';
      exit 0;
      "

networks:
  app-network:
    driver: bridge

volumes:
  minio-storage:
  go-cache:
